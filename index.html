<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>axw.jp</title>
   <link rel="icon" href="/favicon.png">
  <style>
    :root {
      --bg: #0b0b0b;
      --fg: #f5f5f5;
      --muted: #a0a0a0;
      --accent: #ffffff;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .wrap {
      text-align: center;
      max-width: 520px;
      padding: 24px;
    }

    .logo {
      font-size: 64px;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .tagline {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    a {
      color: var(--fg);
      text-decoration: none;
      padding: 10px 14px;
      border: 1px solid #333;
      border-radius: 10px;
      transition: 0.2s;
    }

    a:hover {
      border-color: var(--fg);
      transform: translateY(-1px);
    }

    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">axw</div>
    <!-- <div class="tagline">notes / experiments / systems</div> -->

    <div class="links">
      <a href="https://scrapbox.io/axw" target="_blank">Cosense</a>
      <a href="https://note.com/axw" target="_blank">note</a>
      <a href="https://x.com/axw_jp" target="_blank">X (Twitter)</a>
      <a href="https://instagram.com/axwjp" target="_blank">Instagram</a>
    </div>

    <div class="footer">© axw</div>
  </div>
</body>
</html>
